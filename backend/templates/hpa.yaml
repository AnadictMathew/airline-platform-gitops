# HPA = auto scaling pods
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler

metadata:
  name: airline-backend-hpa
  namespace: {{ .Values.namespace }}

spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: airline-backend

  minReplicas: 1
  maxReplicas: 4

  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70